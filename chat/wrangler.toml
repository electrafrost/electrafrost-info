name = "electra-chat"
main = "worker.mjs"
compatibility_date = "2026-04-01"

# AI binding for embeddings
[ai]
binding = "AI"

# Vectorize binding for the corpus index
[[vectorize]]
binding = "VECTORIZE"
index_name = "electra-corpus"

# Observability — see logs in the Cloudflare dashboard
[observability]
enabled = true

# Note: [limits] cpu_ms is only available on paid Workers plans.
# Free plan gives 10 seconds CPU per request, which is sufficient
# for embed-question + Vectorize-query + Claude generation.
