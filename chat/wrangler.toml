name = "electra-chat"
main = "worker.mjs"
compatibility_date = "2026-04-01"

# AI binding for embeddings
[ai]
binding = "AI"

# Vectorize binding for the corpus index
[[vectorize]]
binding = "VECTORIZE"
index_name = "electra-corpus"

# D1 binding for the question log
# Database ID gets filled in by `wrangler d1 create electra-chat-log`
[[d1_databases]]
binding = "DB"
database_name = "electra-chat-log"
database_id = "REPLACE_WITH_DATABASE_ID_FROM_WRANGLER_D1_CREATE"

# Observability — see logs in the Cloudflare dashboard
[observability]
enabled = true

# Note: [limits] cpu_ms is only available on paid Workers plans.
# Free plan gives 10 seconds CPU per request, which is sufficient
# for embed-question + Vectorize-query + Claude generation.
